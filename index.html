<style>

<body>
<div class="wrap">
  <div class="brand">
    <div class="paw">🐾</div>
    <h1>Find Your Match</h1>
    <p>Honest matching. Real dogs. The right fit, not just the cutest one.</p>
  </div>
  <div class="card" id="app"><div>
        <h2>What brings you here today?</h2>
        <p class="lead">No wrong answer. We'll take it from here.</p>
        <button class="opt" data-p="adopt"><strong>I'm hoping to adopt</strong>
          <span>Find the dog whose life fits yours.</span></button>
        <button class="opt" data-p="foster"><strong>I want to foster</strong>
          <span>Open your home for a while. It matters more than you know.</span></button>
        <button class="opt" data-p="help"><strong>I need help with my own dog</strong>
          <span>Something's hard right now. Let's look at it together.</span></button>
      </div></div>
</div>
<div class="devnote">Working prototype with email capture. Three paths: adopt, foster, help with my dog.</div>

<script>
/* ============================================================
   LEGACY PAWS — MATCH QUIZ + EMAIL CAPTURE
   Paths: adopt | foster | help
   Capture model:
     - adopt/foster: gentle OPTIONAL ask AFTER results
     - help: framed as "send me this plan", after the plan
     - foster: tags duration + flags emergency/on-call
   Capture writes to window.LP_CAPTURE() which you point at
   your Wix form endpoint. Until then it stores locally and
   shows the confirmation so the flow is fully testable.
   ============================================================ */

const app = document.getElementById('app');
let STATE = { path:null, answers:{}, result:null };

/* ---------- CAPTURE HOOK ----------
   Replace the body of lpSend() with your Wix form POST.
   It receives a tagged contact object. Returns a Promise. */
function lpSend(contact){
  // Live: posts the tagged contact to your Wix Velo endpoint,
  // which writes a row into the QuizLeads collection.
  return fetch('https://www.legacypawsrescue.org/_functions/quizLead', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(contact)
  }).then(function(r){
    if(!r.ok) throw new Error('bad response');
    return r.json();
  });
}

function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
function go(render){ app.innerHTML=''; render(); window.scrollTo({top:0,behavior:'smooth'}); }

/* ---------------- FRONT DOOR ---------------- */
function start(){
  go(()=>{
    app.appendChild(el(`
      <div>
        <h2>What brings you here today?</h2>
        <p class="lead">No wrong answer. We'll take it from here.</p>
        <button class="opt" data-p="adopt"><strong>I'm hoping to adopt</strong>
          <span>Find the dog whose life fits yours.</span></button>
        <button class="opt" data-p="foster"><strong>I want to foster</strong>
          <span>Open your home for a while. It matters more than you know.</span></button>
        <button class="opt" data-p="help"><strong>I need help with my own dog</strong>
          <span>Something's hard right now. Let's look at it together.</span></button>
      </div>`));
    app.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>{
      STATE.path=b.dataset.p; STATE.answers={};
      b.dataset.p==='help' ? helpFlow() : gateFlow();
    });
  });
}

/* ---------------- SHARED GATES (adopt + foster) ----------------
   Only these six DECIDE the match. They are hard safety gates. */
const GATES=[
  {key:'kids', q:'Who lives in your home?', opts:[
    {t:'Adults only', v:'none'},
    {t:'Older kids (school age and up)', v:'older'},
    {t:'Young children under 6', v:'young'}]},
  {key:'pets_dogs', q:'Any other dogs at home?', opts:[
    {t:'No dogs', v:'no'},{t:'Yes, one or more dogs', v:'yes'}]},
  {key:'pets_cats', q:'Any cats at home?', opts:[
    {t:'No cats', v:'no'},{t:'Yes, one or more cats', v:'yes'}]},
  {key:'pets_small', q:'Any small animals or livestock? (rabbits, chickens, goats...)', opts:[
    {t:'None', v:'no'},{t:'Yes', v:'yes'}]},
  {key:'exp', q:'How would you describe your experience with dogs?', opts:[
    {t:'First-time or newer owner', v:'new'},
    {t:'Comfortable and experienced', v:'exp'},
    {t:'Very experienced with strong-willed dogs', v:'expert'}]},
  {key:'energy', q:'What does daily life look like?', opts:[
    {t:'Quiet and low-key, lots of rest', v:'low'},
    {t:'A steady mix of calm and activity', v:'med'},
    {t:'Active, outdoors, always moving', v:'high'}]},
];

/* ---------------- REFLECTION QUESTIONS (adopt + foster) ----------------
   These do NOT gate any dog. They deepen the experience, help the person
   reflect, and ride along into the lead data. Nine of them, so the whole
   adopt/foster path is fifteen. Each carries a short lead-in so it feels
   like a conversation, not an intake form. */
const REFLECT=[
  {key:'home_hours', lead:"Let's get to know your world a little.",
    q:'On a normal day, how much of the time is someone home?', opts:[
    {t:'Almost always, someone is usually here', v:'mostly'},
    {t:'Part of the day, gone for stretches', v:'partial'},
    {t:'Out most of the day, home evenings', v:'away'}]},
  {key:'housing', q:'Where would the dog be living?', opts:[
    {t:'House with a yard', v:'house_yard'},
    {t:'House, no fenced yard', v:'house_nofence'},
    {t:'Apartment or rental', v:'apartment'},
    {t:'Land or farm', v:'land'}]},
  {key:'outside', q:'When a dog needs to move and sniff and just be a dog, what can you offer?', opts:[
    {t:'Trails, land, lots of room to roam', v:'lots'},
    {t:'Daily walks and a yard', v:'walks'},
    {t:'Shorter walks, quieter pace', v:'quiet'}]},
  {key:'bond', lead:"This next part is more about your heart than your house.",
    q:'What kind of bond are you hoping for?', opts:[
    {t:'A steady shadow who is always near me', v:'shadow'},
    {t:'A buddy for adventures and the outdoors', v:'adventure'},
    {t:'A calm companion for a quiet life together', v:'calm'},
    {t:'Honestly, I just want to give a dog a soft place to land', v:'soft'}]},
  {key:'hard_days', q:'When a dog is struggling, scared, not house-trained yet, grieving, what feels true for you?', opts:[
    {t:'I expect that, and I am ready to work through it', v:'ready'},
    {t:'I can handle some, but I would want guidance', v:'guidance'},
    {t:'I am hoping for a dog who is mostly settled already', v:'settled'}]},
  {key:'past', q:'Have you shared your life with a dog before?', opts:[
    {t:'Yes, and I still carry one in my heart', v:'lost'},
    {t:'Yes, I have one or more now', v:'current'},
    {t:'This would be my first', v:'first'}]},
  {key:'commit', q:'A rescue dog can take weeks or months to fully exhale and trust. How does that sit with you?', opts:[
    {t:'That is exactly what I am signing up for', v:'allin'},
    {t:'I am willing, I just want to know what to expect', v:'willing'},
    {t:'I had not thought about it that way', v:'new_thought'}]},
  {key:'why', lead:"Almost done. This one matters most to us.",
    q:'What pulled you toward a rescue instead of a breeder or a shop?', opts:[
    {t:'I believe the overlooked ones deserve a real chance', v:'overlooked'},
    {t:'I have rescued before and would never go back', v:'always'},
    {t:'Something about it just feels right', v:'feels_right'}]},
  {key:'timing', q:'Where are you in all this, honestly?', opts:[
    {t:'Ready now, today if the right dog is here', v:'now'},
    {t:'Getting ready, planning for soon', v:'soon'},
    {t:'Just looking, feeling it out', v:'looking'}]},
];

function gateFlow(){
  let i=0;
  const TOTAL=GATES.length+REFLECT.length+(STATE.path==='foster'?1:0);
  function ask(){
    if(i>=GATES.length+REFLECT.length){ STATE.path==='foster'?fosterDuration():matchDogs(); return; }
    const fromGate = i<GATES.length;
    const g = fromGate ? GATES[i] : REFLECT[i-GATES.length];
    go(()=>{
      app.appendChild(el(`<div class="progress"><span style="width:${(i/TOTAL)*100}%"></span></div>`));
      const box=el(`<div>${g.lead?`<p class="lead" style="margin-bottom:8px;color:var(--muted);">${g.lead}</p>`:''}<h2>${g.q}</h2></div>`);
      g.opts.forEach(o=>{ if(!o||!o.t) return; const b=el(`<button class="opt"><strong>${o.t}</strong></button>`);
        b.onclick=()=>{ STATE.answers[g.key]=o.v; i++; ask(); }; box.appendChild(b); });
      app.appendChild(box);
    });
  }
  ask();
}

function fosterDuration(){
  const TOTAL=GATES.length+REFLECT.length+1;
  go(()=>{
    app.appendChild(el(`<div class="progress"><span style="width:${((TOTAL-1)/TOTAL)*100}%"></span></div>`));
    const box=el(`<div><h2>How long could you foster?</h2>
      <p class="lead">Every length helps. Be honest about what fits your life.</p></div>`);
    [['short','A week or two','short'],
     ['medium','A few weeks to a couple months','medium'],
     ['open','Open-ended, until the right home comes','open'],
     ['emergency','Emergency / on-call, ready on short notice','emergency']]
     .forEach(([v,t,tag])=>{ const b=el(`<button class="opt"><strong>${t}</strong></button>`);
        b.onclick=()=>{ STATE.answers.duration=v; matchDogs(); }; box.appendChild(b); });
    app.appendChild(box);
  });
}

/* ---------------- DOGS + MATCH ---------------- */
const DOGS=[
  {id:'piper', name:'Piper', emoji:'🛡️',
   blocks:{kids:'young', pets_dogs:'yes', pets_cats:'yes', pets_small:'yes', exp:'new'},
   needExpert:true,
   why:'You can handle a strong, complicated heart, and you can give her the only-dog home she needs.',
   life:'Piper needs to be your one and only. No other animals, no young kids, and a person who reads dogs well. She is the hardest love we have, and the most loyal once she trusts you.'},
  {id:'dobby', name:'Dobby', emoji:'🤍', blocks:{}, needExpert:false, adopted:true,
   why:'',
   life:'Dobby came to us at 24 pounds and fought his way back to 52. In June 2026 he found his forever home. He is proof that patience works, and that the overlooked ones really do get their happy ending here.'},
  {id:'kyra', name:'Kyra', emoji:'🌟', blocks:{}, needExpert:false, mentorOnly:true,
   why:'',
   life:'Kyra is our permanent mentor dog. She is not up for adoption, but she helps every dog who comes through learn how to be a dog again.'},
];

function dogPasses(d){
  const a=STATE.answers;
  if(d.adopted) return false;
  for(const k in d.blocks){ if(a[k]===d.blocks[k]) return false; }
  if(d.needExpert && a.exp==='new') return false;
  if(d.mentorOnly) return false;
  return true;
}

function matchDogs(){
  const passing=DOGS.filter(dogPasses);
  STATE.result={type:STATE.path, dogs:passing.map(d=>d.id)};
  go(()=>{
    const verb=STATE.path==='foster'?'foster':'adopt';
    if(!passing.length){
      app.appendChild(el(`<div>
        <h2>Let's talk first.</h2>
        <p class="lead">Based on your home, none of our dogs available right now would be a safe, honest fit. That's not a no to you. It often just means timing, and the right dog isn't here yet. Leave your email and we'll reach out the moment one arrives who truly fits your life.</p>
      </div>`));
      const adoptedDogs=DOGS.filter(d=>d.adopted);
      if(adoptedDogs.length){
        const sb=el(`<div><p class="lead" style="color:var(--muted);margin-bottom:10px;">And so you know the wait is worth it, here's how it goes when it works:</p></div>`);
        adoptedDogs.forEach(d=>{
          sb.appendChild(el(`<div class="match" style="border-left-color:var(--teal);background:#f2fafb;">
            <h4>${d.emoji} ${d.name} <span style="font-size:12px;color:var(--teal);font-weight:700;">ADOPTED</span></h4>
            <p>${d.life}</p></div>`)); });
        app.appendChild(sb);
      }
      captureBlock({verb});
      return;
    }
    const box=el(`<div><h2>Here's who could be your match</h2>
      <p class="lead">Honest matches only. These are the dogs who'd be safe and happy in the home you described.</p></div>`);
    passing.forEach(d=>{
      box.appendChild(el(`<div class="match">
        <h4>${d.emoji} ${d.name}</h4>
        ${d.why?`<div class="why">Why you: ${d.why}</div>`:''}
        <p>${d.life}</p></div>`)); });
    // success stories: dogs already adopted, shown as proof the rescue works
    DOGS.filter(d=>d.adopted).forEach(d=>{
      box.appendChild(el(`<div class="match" style="border-left-color:var(--teal);background:#f2fafb;">
        <h4>${d.emoji} ${d.name} <span style="font-size:12px;color:var(--teal);font-weight:700;">ADOPTED</span></h4>
        <p>${d.life}</p></div>`)); });
    app.appendChild(box);
    captureBlock({verb});
  });
}

/* ---------------- HELP PATH (mismatch engine) ---------------- */
const HELP_Q=[
  {key:'issue', q:"What's the hardest thing right now?", opts:[
    {t:'He guards food, toys, or space', v:'guard'},
    {t:'He barks or lunges at dogs or people', v:'react'},
    {t:'He falls apart when I leave', v:'sep'},
    {t:'He pulls hard on the leash', v:'leash'},
    {t:'He jumps and never settles', v:'jump'},
    {t:"He's glued to me and the house is always full", v:'velcro'},
    {t:"Honestly, I'm not sure, just something's off", v:'unsure'}]},
];

const PLANS={
  guard:{title:'He growls over his food',
    read:"That growl isn't him being bad. It's him telling the truth: in some earlier life, things he needed disappeared, and now he's keeping what's his the only way he knows how.",
    feeling:'Fear of losing what he needs to survive. Not dominance. Survival.',
    getting:'Right now the growl works. People back off, so it keeps happening. We change what it earns him.',
    now:"Never punish the growl. The growl is the warning label. Punish it and you get a dog who bites with no warning. Instead, walk past his bowl and drop something better in it, chicken, cheese, so your approach starts to mean good things arrive, not leave. Hand-feed a few meals so the food literally comes from you. If you must move a bowl, lift it straight up when it's empty, never drag it out from under him.",
    backfire:'Taking his bowl away "to show him who\'s boss" teaches him you are the threat he feared. It makes guarding worse, not better.',
    help:"Help is more there than it looks. Most food guarding settles with steady, calm work like this over a few weeks. If he's already bitten or it's escalating, a certified behavior consultant can work alongside you, and that's a strength, not a failure."},
  react:{title:'He barks and lunges',
    read:"A dog who lunges usually isn't angry. He's scared, and he's learned that making himself big and loud makes the scary thing go away.",
    feeling:'Fear dressed up as bravado. He wants distance, and noise buys it.',
    getting:'Every time he barks and the other dog passes, his outburst "worked." It gets reinforced daily.',
    now:"Give him distance before he tips over. Find the range where he notices the trigger but can still take a treat, and work there. The second he sees the other dog, feed him, so the trigger predicts chicken instead of conflict. Don't march him up to other dogs to make him deal with it. Turn and make space. Calm is a direction you walk toward.",
    backfire:'Yanking the leash or yelling when he reacts adds your stress to his. Now the trigger means both danger and your anger.',
    help:"Help is more there than it looks. Distance plus good timing changes a lot of dogs. If he's big, strong, or has a bite history, a reactivity-experienced trainer is the right call, and reaching for one means you're taking it seriously."},
  sep:{title:'He falls apart the second you leave',
    read:"This isn't him being needy or spiteful. A dog who panics alone is a dog who, somewhere, got left and it meant something terrible.",
    feeling:'Genuine panic. Closer to a human panic attack than to misbehavior.',
    getting:"Long emotional goodbyes and big homecomings tell him departures are a huge deal. We make them boring.",
    now:"Keep comings and goings flat and calm, no drama either direction. Practice leaving for seconds, then minutes, building up slowly so being alone stops predicting abandonment. Give him something that lasts, a stuffed frozen Kong, tied to you walking out, so the door starts to mean good things.",
    backfire:'Punishing the mess or the noise you come home to adds fear to a dog who is already terrified. He can\'t connect it to anything except that you came back upset.',
    help:"Help is more there than it looks. Mild cases ease with slow, steady practice. True separation panic is real and treatable, often faster with a behavior professional and sometimes your vet, and using them is wisdom, not weakness."},
  leash:{title:'He drags you down the street',
    read:"He's not trying to dominate the walk. The world is thrilling and he simply never learned that a loose leash is how you get to keep moving.",
    feeling:'Excitement and a lack of a rule he was never taught.',
    getting:'Right now pulling works, he pulls, he gets forward. So he pulls harder.',
    now:"Make pulling stop working. The moment the leash goes tight, you stop, like a tree. Slack returns, you move again. Boring but it teaches fast: tight leash, nothing happens; loose leash, the walk continues. Reward him for being beside you with a treat down at your knee so that spot pays off.",
    backfire:'Jerking him back constantly just builds a dog who leans into pressure harder. You become part of the tug-of-war.',
    help:"Help is more there than it looks. Most pulling is a teaching problem and gets better with consistency. A good force-free trainer can shortcut it, especially if he's strong enough to hurt you."},
  jump:{title:'He jumps on everyone',
    read:"Jumping is love with no off switch. He's not being rude, he's flooded with joy and his whole body says hello.",
    feeling:'Pure social excitement looking for a place to land.',
    getting:'He jumps, he gets eyes, hands, words, even "off!" is attention. It pays.',
    now:"Make four-on-the-floor the thing that earns attention. When he jumps, turn away and go quiet, no eyes, no touch, no talk. The instant his feet land, turn back and reward. Ask guests to do the same. He learns the fastest way to get the person is to keep his feet down.",
    backfire:'Kneeing him or shoving him off reads as rough play to an excited dog. Some jump more, because hey, you engaged.',
    help:"Help is more there than it looks. This one usually fixes itself with everyone staying consistent. If he's big enough to knock someone over, a trainer can speed it up."},
  velcro:{title:"A close-bonded dog in a house that's always full",
    read:"He found his person, you, and after whatever came before, he's terrified to let you out of sight. The full house just gives him more to track and more to lose.",
    feeling:'Insecurity. He hasn\'t yet learned that you always come back.',
    getting:'Following you everywhere gets reassured every time. We help him feel safe at a small distance too.',
    now:"Build tiny absences inside the house. Step behind a door and come right back, before he panics, so distance stops being scary. Give him a great spot of his own, a bed with something that smells like you, near the action but his. Reward him for settling there on his own. Let calm be where the good stuff happens.",
    backfire:'Shooing him away to "teach independence" confirms his fear that closeness to you is unstable. Gentle, predictable distance works better than rejection.',
    help:"Help is more there than it looks. Most velcro dogs relax as they learn the house is safe. If it tips into true panic when you leave, a behavior professional can help you build his confidence."},
};

/* Follow-up diagnostic questions for the help path. Shown AFTER the
   reassurance and issue pick, BEFORE the plan. They sharpen the read and
   tell Domenica what her community struggles with. Reassurance stays first
   so a stressed person feels cared for before answering more. */
const HELP_FOLLOWUP=[
  {key:'h_duration', lead:"A few quick things so this actually fits your dog.",
    q:'How long has this been going on?', opts:[
    {t:'It is new, the last week or two', v:'new'},
    {t:'A while now, a month or more', v:'months'},
    {t:'As long as I have had him', v:'always'}]},
  {key:'h_intensity', q:'When it happens, how big is it?', opts:[
    {t:'Mild, more annoying than scary', v:'mild'},
    {t:'Real, it stops me in my tracks', v:'real'},
    {t:'Intense, someone could get hurt', v:'intense'}]},
  {key:'h_when', q:'When does it tend to show up?', opts:[
    {t:'Around specific things or triggers', v:'triggered'},
    {t:'When he is alone or I am leaving', v:'alone'},
    {t:'Pretty much anytime, hard to predict', v:'anytime'}]},
  {key:'h_tried', q:'What have you already tried?', opts:[
    {t:'Honestly, I am not sure where to start', v:'nothing'},
    {t:'A few things I read or was told', v:'some'},
    {t:'A lot, and I am worn out by it', v:'lots'}]},
  {key:'h_who', q:'Who else shares the home with him?', opts:[
    {t:'Just me, or me and other adults', v:'adults'},
    {t:'Kids in the house too', v:'kids'},
    {t:'Other pets in the mix', v:'pets'}]},
];

function helpFlow(){
  const g=HELP_Q[0];
  go(()=>{
    const box=el(`<div><h2>${g.q}</h2>
      <p class="lead">Whatever it is, it doesn't make you a bad owner. It makes you one who's paying attention.</p></div>`);
    g.opts.forEach(o=>{ const b=el(`<button class="opt"><strong>${o.t}</strong></button>`);
      b.onclick=()=>{ STATE.answers.issue=o.v; o.v==='unsure'?helpResult('unsure'):helpFollowup(); }; box.appendChild(b); });
    app.appendChild(box);
  });
}

function helpFollowup(){
  let i=0;
  const TOTAL=1+HELP_FOLLOWUP.length+1; // issue + followups + plan
  function ask(){
    if(i>=HELP_FOLLOWUP.length){ helpResult(STATE.answers.issue); return; }
    const g=HELP_FOLLOWUP[i];
    go(()=>{
      app.appendChild(el(`<div class="progress"><span style="width:${((i+1)/TOTAL)*100}%"></span></div>`));
      const box=el(`<div>${g.lead?`<p class="lead" style="margin-bottom:8px;color:var(--muted);">${g.lead}</p>`:''}<h2>${g.q}</h2></div>`);
      g.opts.forEach(o=>{ const b=el(`<button class="opt"><strong>${o.t}</strong></button>`);
        b.onclick=()=>{ STATE.answers[g.key]=o.v; i++; ask(); }; box.appendChild(b); });
      app.appendChild(box);
    });
  }
  ask();
}

function helpResult(v){
  STATE.result={type:'help', issue:v};
  go(()=>{
    app.appendChild(el(`<div class="foundation">
      <h4>First, the ground under all of it</h4>
      Dogs live in right now. He isn't plotting, and he isn't holding a grudge. He's telling you how he feels in the only language he has: his body. When you change what a behavior earns him, you change the behavior. That's the whole game, and it's gentler than it sounds.</div>`));
    if(v==='unsure'){
      app.appendChild(el(`<div class="gap ok">
        <h4>Something's off, and you noticed. That counts.</h4>
        <div class="clash">Start here</div>
        <p class="step-txt">Watch his body for a day like you'd watch a toddler who can't talk yet. When does he stiffen, pant, pace, hide, or get loud? Those moments are him telling you what's hard. Once you can name the moment, come back and pick the issue that fits. You'll get a real plan made for it.</p>
        <div class="helpline">Help is more there than it looks. If you can't find the pattern, a calm conversation with your vet rules out pain first, which is where a surprising amount of so-called behavior actually starts.</div>
      </div>`));
      captureBlock({verb:'help'});
      return;
    }
    const pl=PLANS[v];
    // a gentle line that reflects their intensity answer back, if given
    let note='';
    if(STATE.answers.h_intensity==='intense'){
      note=`<div class="backfire" style="background:#fbeae7;"><b>One thing first:</b> you said this gets intense enough that someone could get hurt. The plan below is real and worth starting, but please don't carry that part alone. A certified behavior professional, and your vet to rule out pain, are the right call now, and reaching for them is the strong move, not the failing one.</div>`;
    }
    app.appendChild(el(`<div class="gap">
      <h4>${pl.title}</h4>
      <div class="plan-read">${pl.read}</div>
      ${note}
      <div class="step"><span class="step-lbl">What he's feeling</span><span class="step-txt">${pl.feeling}</span></div>
      <div class="step"><span class="step-lbl">What he's getting from it</span><span class="step-txt">${pl.getting}</span></div>
      <div class="step"><span class="step-lbl">How we change the now</span><span class="step-txt">${pl.now}</span></div>
      <div class="backfire"><b>The well-meaning move that backfires:</b> ${pl.backfire}</div>
      <div class="helpline">${pl.help}</div>
    </div>`));
    captureBlock({verb:'help'});
  });
}

/* ---------------- EMAIL CAPTURE BLOCK ---------------- */
function captureBlock({verb}){
  const isHelp = verb==='help';
  const heading = isHelp ? 'Want me to send this to you?' :
    (verb==='foster' ? 'Want us to keep you posted?' : 'Want us to stay in touch?');
  const blurb = isHelp
    ? "Drop your email and we'll send this plan to your inbox so you have it whenever you need it. No spam, just this and the occasional thing we think actually helps."
    : (verb==='foster'
      ? "Leave your email and we'll reach out when a dog needs the kind of foster home you described. You're under no obligation. We just know who to call when the moment comes."
      : "Leave your email and we'll follow up about next steps, no pressure and no obligation. This is an invitation, not a commitment.");

  const cap=el(`<div class="capture">
    <h3>${heading}</h3>
    <p>${blurb}</p>
    <div class="err" id="cap-err">Please enter a valid email.</div>
    <div class="row">
      <input id="cap-name" type="text" placeholder="First name (optional)" autocomplete="given-name">
    </div>
    <input id="cap-email" type="email" placeholder="you@email.com" autocomplete="email">
    <button class="btn full navy" id="cap-send">${isHelp?'Send it to me':'Keep me posted'}</button>
    <div class="privacy">We never share or sell your email. Ever.</div>
  </div>`);
  app.appendChild(cap);

  const dest = verb==='foster'
    ? 'https://www.legacypawsrescue.org/foster'
    : verb==='adopt'
      ? 'https://www.legacypawsrescue.org/adoption-application'
      : 'mailto:info@legacypawsrescue.org?subject=Help%20with%20my%20dog';
  const destLabel = verb==='foster' ? 'Start a foster application'
    : verb==='adopt' ? 'Start an adoption application'
    : 'Talk to us about your dog';
  app.appendChild(el(`<div style="text-align:center;margin-top:16px;">
    <a class="btn full" href="${dest}" target="_top" style="text-decoration:none;">${destLabel}</a>
  </div>`));

  const restart=el(`<button class="btn ghost restart">Start over</button>`);
  restart.onclick=start; app.appendChild(restart);

  document.getElementById('cap-send').onclick=()=>{
    const email=document.getElementById('cap-email').value.trim();
    const name=document.getElementById('cap-name').value.trim();
    const err=document.getElementById('cap-err');
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ err.style.display='block'; return; }
    err.style.display='none';

    const tags=['quiz', STATE.path];
    let fosterDuration=null, emergency=false, resultLabel='';
    if(STATE.path==='foster'){
      fosterDuration=STATE.answers.duration||null;
      if(fosterDuration) tags.push('foster:'+fosterDuration);
      if(fosterDuration==='emergency'){ emergency=true; tags.push('URGENT-oncall'); }
    }
    if(STATE.path==='adopt' && STATE.result?.dogs?.length){
      resultLabel='match:'+STATE.result.dogs.join(','); tags.push(resultLabel);
    }
    if(STATE.path==='help'){ resultLabel='help:'+(STATE.answers.issue||''); tags.push(resultLabel); }

    // Bundle every extra answer into one readable details string so it all
    // lands in the lead without bloating the tags. Skips the core fields.
    const skip={duration:1,issue:1};
    const details=Object.keys(STATE.answers)
      .filter(k=>!skip[k])
      .map(k=>k+'='+STATE.answers[k])
      .join('; ');

    const contact={ email, name, path:STATE.path, tags, fosterDuration, emergency, resultLabel, details };
    const btn=document.getElementById('cap-send'); btn.textContent='Saving...'; btn.disabled=true;
    lpSend(contact).then(()=>{
      cap.innerHTML=`<div class="ok">Got it${name?', '+name:''}. ${STATE.path==='foster'&&emergency?"We'll be in touch fast.":"You'll hear from us soon."} 🐾</div>`;
    }).catch(()=>{ btn.textContent='Try again'; btn.disabled=false; err.textContent='Something went wrong. Please try again.'; err.style.display='block'; });
  };
}

start();
</script>


</body></html>
